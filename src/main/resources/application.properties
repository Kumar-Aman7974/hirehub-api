spring.application.name=hirehub-api

# Create this file after extracting the project
# Location: src/main/resources/application.properties

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hirehub_db
spring.datasource.username=root
spring.datasource.password=Kumar@123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# JWT Configuration
# 15 minutes in milliseconds
jwt.access-token-expiration=900000
# 7 days in milliseconds
jwt.refresh-token-expiration=604800000

# Security Headers (optional but recommended)
server.error.include-stacktrace=never
server.error.include-message=always

#Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.host=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#Email Sender Details
email.from.address=${EMAIL_FROM_ADDRESS}
email.from.name="HireHub Team"

#Async Email Configuration
email.async.enabled=true
email.retry.max-attempts=3
email.retry.delay=5000

#Email Templates Location
spring.thymeleaf.prefix=classpath:/templates/email/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false



# Server
server.port=8080

# Email configuration (example values - replace with real SMTP credentials)
email.from.address=no-reply@hirehub.local
email.from.name=HireHub

# SMTP settings - replace with your SMTP provider (Mailtrap shown as example)
spring.mail.host=smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=YOUR_MAIL TRAP_USERNAME
spring.mail.password=YOUR_MAIL TRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
