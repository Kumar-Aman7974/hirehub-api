spring.application.name=hirehub-api

# Create this file after extracting the project
# Location: src/main/resources/application.properties

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hirehub_db
spring.datasource.username=root
spring.datasource.password=Kumar@123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# JWT Configuration
# 15 minutes in milliseconds
jwt.access-token-expiration=900000
# 7 days in milliseconds
jwt.refresh-token-expiration=604800000

# Security Headers (optional but recommended)
server.error.include-stacktrace=never
server.error.include-message=always

#Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.timeout=5000

#Email Sender Details
email.from.address=${MAIL_FROM}
email.from.name=HireHub Team

#Async Email Configuration
email.async.enabled=true
email.retry.max-attempts=3
email.retry.delay=5000

#Email Templates Location
spring.thymeleaf.prefix=classpath:/templates/email/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false



# Server
server.port=8080




# Storage Directory
file.upload-dir=./uploads

# File Size Limits (in bytes)
file.max-size=10485760
file.resume-max-size=5242880
file.image-max-size=2097152

# Allowed File Types (comma-separated)
file.allowed-types=PDF,DOCX,JPEG,PNG,GIF


# SPRING BOOT FILE UPLOAD CONFIGURATION

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.location=./uploads/temp

# Swagger/OpenAPI Configuration
#springdoc.api-docs.path=/api-docs
#springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-common-extensions=true
springdoc.show-actuator=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

